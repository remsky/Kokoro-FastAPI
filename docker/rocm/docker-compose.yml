name: kokoro-fastapi-rocm
services:
  kokoro-tts:
      # image: ghcr.io/remsky/kokoro-fastapi-rocm:v${VERSION}
      build:
        context: ../..
        dockerfile: docker/rocm/Dockerfile
      devices:
        - /dev/dri
        - /dev/kfd
      group_add:
      # NOTE: These groups are the group ids for: video, input, and render
      # Numbers can be found via running: getent group $GROUP_NAME | cut -d: -f3
        - 44
        - 993
        - 996
      restart: 'always'
      # Named volumes persist the MIOpen find DB and kernel cache at the paths
      # MIOpen actually writes to ($HOME/.config/miopen and $HOME/.cache/miopen
      # for appuser). Defined at the bottom of this file. Survives
      # `docker compose down`; `docker compose down -v` clears them. Inspect
      # contents with `docker volume inspect kokoro-fastapi-rocm_miopen_cache`.
      volumes:
        - miopen_config:/home/appuser/.config/miopen
        - miopen_cache:/home/appuser/.cache/miopen
      ports:
        - 8880:8880
      environment:
        - USE_GPU=true
        # - ALLOW_DEV_UNLOAD=true
        # - ENABLE_DEBUG_ENDPOINTS=true
        - TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=1
        # MIOPEN_FIND_MODE=2 is set by default in the Dockerfile. It reuses the
        # on-disk find DB and skips the expensive per-process kernel search.
        # The named volumes above persist that cache across runs.
        # See: https://github.com/ROCm/MIOpen/blob/develop/docs/conceptual/tuningdb.rst
        #
        # To pre-populate the cache for best-case latency (recommended for RDNA 2+):
        # 1. Override the env to force an exhaustive search:
        #      - MIOPEN_FIND_MODE=3
        #      - MIOPEN_FIND_ENFORCE=3
        # 2. Run docker/rocm/warmup_miopen.py inside the container, or generate
        #    audio for varied input lengths (e.g. a few paragraphs of Dracula).
        # 3. Remove the overrides. The default (FIND_MODE=2) will reuse the cache.

volumes:
  miopen_config:
  miopen_cache:
