name: Build & Publish TTS API Test Client Image

# Publishes the TTS API test client image to GHCR.
#
# This image bakes in faster-whisper + Whisper small CT2 weights and the
# audio-decoding stack (soundfile + libsndfile, pyav via faster-whisper) so
# that `docker-compose.test.yml` can run end-to-end protocol + transcription
# tests against a running server without touching Hugging Face at CI time.
#
# Lifecycle is independent of the app version. Rebuilt only when the
# Dockerfile or pinned dep set changes, or on manual dispatch.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag to publish (also always re-tagged as `latest`)'
        required: true
        type: string
        default: 'v1'
      push:
        description: 'Push to registry (uncheck for a dry build)'
        required: false
        type: boolean
        default: true
  push:
    branches: [master, release]
    paths:
      - 'docker/test-client/**'
      - '.github/workflows/test_client_image.yml'

concurrency:
  group: test-client-image-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
    env:
      REGISTRY: ${{ vars.REGISTRY || 'ghcr.io' }}
      OWNER: ${{ vars.OWNER || 'remsky' }}
      IMAGE_NAME: ${{ vars.TEST_CLIENT_IMAGE_NAME || 'tts-api-test-client' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image refs
        id: refs
        run: |
          BASE="${REGISTRY}/${OWNER}/${IMAGE_NAME}"
          # Manual dispatch picks the tag; path-triggered builds always
          # publish `latest` plus a short-sha tag for traceability.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PRIMARY="${BASE}:${{ inputs.image_tag }}"
          else
            PRIMARY="${BASE}:sha-${GITHUB_SHA:0:7}"
          fi
          echo "primary=${PRIMARY}" >> "$GITHUB_OUTPUT"
          echo "latest=${BASE}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'workflow_dispatch' || inputs.push
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/test-client
          platforms: linux/amd64
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          tags: |
            ${{ steps.refs.outputs.primary }}
            ${{ steps.refs.outputs.latest }}
          cache-from: type=gha,scope=test-client
          cache-to: type=gha,mode=max,scope=test-client
