name: Create Release and Publish Docker Images

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      version_tag: ${{ steps.get-version.outputs.version_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from VERSION file
        id: get-version
        run: |
          VERSION_PLAIN=$(cat VERSION)
          echo "version=${VERSION_PLAIN}" >> $GITHUB_OUTPUT
          echo "version_tag=v${VERSION_PLAIN}" >> $GITHUB_OUTPUT

  build-images:
    needs: prepare-release
    permissions:
      packages: write
    env:
      DOCKER_BUILDKIT: 1
      BUILDKIT_STEP_LOG_MAX_SIZE: 10485760
      VERSION: ${{ needs.prepare-release.outputs.version_tag }}
      REGISTRY: ${{ vars.REGISTRY || 'ghcr.io' }}
      OWNER: ${{ vars.OWNER || 'remsky' }}
      REPO: ${{ vars.REPO || 'kokoro-fastapi' }}
      DOCKERHUB_REPO: cipherdolls/kokoro-fastapi
    strategy:
      matrix:
        include:
          - build_target: "default"
            platform: "linux/amd64"
            runs_on: "ubuntu-latest"
          - build_target: "default"
            platform: "linux/arm64"
            runs_on: "ubuntu-24.04-arm"
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed to check for existing tags

      - name: Check if tag already exists
        run: |
          TAG_NAME="${{ needs.prepare-release.outputs.version_tag }}"
          echo "Checking for existing tag: $TAG_NAME"
          git fetch --tags
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "::error::Tag $TAG_NAME already exists. Please increment the version in the VERSION file."
            exit 1
          else
            echo "Tag $TAG_NAME does not exist. Proceeding with release."
          fi

      - name: Free disk space
        run: |
          echo "Listing current disk space"
          df -h
          echo "Cleaning up disk space..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          docker system prune -af
          echo "Disk space after cleanup"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push single-platform image
        run: |
          PLATFORM="${{ matrix.platform }}"
          VERSION_TAG="${{ needs.prepare-release.outputs.version_tag }}"
          ARCH="$(echo ${PLATFORM} | cut -d'/' -f2)"

          echo "Building ${PLATFORM} image version ${VERSION_TAG}"

          docker buildx build \
            -f docker/Dockerfile \
            --platform ${PLATFORM} \
            --tag ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}:${VERSION_TAG}-${ARCH} \
            --tag ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}:latest-${ARCH} \
            --tag ${{ env.DOCKERHUB_REPO }}:${VERSION_TAG}-${ARCH} \
            --tag ${{ env.DOCKERHUB_REPO }}:latest-${ARCH} \
            --push --progress=plain .

  create-manifests:
    needs: [prepare-release, build-images]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      REGISTRY: ${{ vars.REGISTRY || 'ghcr.io' }}
      OWNER: ${{ vars.OWNER || 'remsky' }}
      REPO: ${{ vars.REPO || 'kokoro-fastapi' }}
      DOCKERHUB_REPO: cipherdolls/kokoro-fastapi
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-platform manifests
        run: |
          VERSION_TAG="${{ needs.prepare-release.outputs.version_tag }}"
          GHCR="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}"
          DH="${{ env.DOCKERHUB_REPO }}"

          # GHCR manifests
          docker buildx imagetools create -t \
            ${GHCR}:${VERSION_TAG} \
            ${GHCR}:${VERSION_TAG}-amd64 \
            ${GHCR}:${VERSION_TAG}-arm64

          # Docker Hub manifests
          docker buildx imagetools create -t \
            ${DH}:${VERSION_TAG} \
            ${DH}:${VERSION_TAG}-amd64 \
            ${DH}:${VERSION_TAG}-arm64

          if [[ "$VERSION_TAG" != *"-"* ]]; then
            docker buildx imagetools create -t \
              ${GHCR}:latest \
              ${GHCR}:${VERSION_TAG}-amd64 \
              ${GHCR}:${VERSION_TAG}-arm64

            docker buildx imagetools create -t \
              ${DH}:latest \
              ${DH}:${VERSION_TAG}-amd64 \
              ${DH}:${VERSION_TAG}-arm64
          fi

  create-release:
    needs: [prepare-release, create-manifests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.version_tag }}
          name: Release ${{ needs.prepare-release.outputs.version_tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
