[pytest]
testpaths = api/tests
python_files = test_*.py
addopts = -v --tb=short --cov=api --cov-report=term-missing --cov-config=.coveragerc -m "not integration"
pythonpath = .
markers =
    integration: end-to-end test that requires a running TTS server and downloads a Whisper model. Excluded by default; opt in with `pytest -m integration`.
